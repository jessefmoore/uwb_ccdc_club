# ansible-playbook -i hosts2.yml install_burp.yml -K
---
- name: Install Burp Suite Community
  hosts: kali_hosts
  become: true
  gather_facts: true

  vars:
    # URL for the current Linux 64-bit installer
    burp_url: "https://portswigger.net/burp/releases/download?product=community&version=2023.12.1.3&type=Linux"
    install_dir: "/opt/burp"

  tasks:
    - name: Ensure /opt/burp directory exists
      ansible.builtin.file:
        path: "{{ install_dir }}"
        state: directory
        mode: '0755'

    - name: Download Burp Suite Installer
      ansible.builtin.get_url:
        url: "{{ burp_url }}"
        dest: "/tmp/burp_installer.sh"
        mode: '0755'

    - name: Install Burp Suite (Unattended)
      ansible.builtin.command:
        cmd: "/tmp/burp_installer.sh -q -dir {{ install_dir }}"
        creates: "{{ install_dir }}/BurpSuiteCommunity"

    - name: Create a symlink for easy access
      ansible.builtin.file:
        src: "{{ install_dir }}/BurpSuiteCommunity"
        dest: /usr/local/bin/burpsuite
        state: link
