---
- name: Derive the central DB host from this VM's VLAN IP
  ansible.builtin.set_fact:
    central_db_host: "{{ ansible_default_ipv4.address | regex_replace('\\.[0-9]+$', '.' ~ central_db_last_octet) }}"

- name: Wait for the central DB to accept connections
  ansible.builtin.wait_for:
    host: "{{ central_db_host }}"
    port: 3306
    timeout: 240

- name: Create compose directory
  ansible.builtin.file:
    path: "{{ nc_compose_dir }}"
    state: directory
    mode: "0755"
  become: true

- name: Render docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ nc_compose_dir }}/docker-compose.yml"
    mode: "0644"
  become: true
  register: nc_compose

# The official Nextcloud image auto-installs on first boot when both MYSQL_* and
# NEXTCLOUD_ADMIN_* env vars are present, so no post-up step is needed.
- name: Bring up the Nextcloud container
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: "{{ nc_compose_dir }}"
  become: true
  register: nc_up
  changed_when: "'Started' in nc_up.stderr or 'Created' in nc_up.stderr or nc_compose.changed"
